version: "3.8"

services:
  mongo:
    image: mongo
    container_name: hms_mongo
    restart: always
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./Backend
    container_name: hms_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/hms_db
    depends_on:
      - mongo

  frontend:
    build: .
    container_name: hms_frontend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes: mongo-data:/hms
